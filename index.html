<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deadline Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f4f0;
      --bg-tertiary: #eeecea;
      --text-primary: #1a1a18;
      --text-secondary: #6b6a66;
      --border-light: rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.15);
      --border-strong: rgba(0,0,0,0.25);
      --radius-md: 8px;
      --radius-lg: 12px;
      --green: #1D9E75;
      --green-bg: #E1F5EE;
      --green-text: #0F6E56;
      --amber-bg: #FAEEDA;
      --amber-text: #854F0B;
      --red-bg: #FCEBEB;
      --red-text: #A32D2D;
      --gray-bg: #f0efeb;
      --gray-text: #6b6a66;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1c;
        --bg-secondary: #2a2a28;
        --bg-tertiary: #141412;
        --text-primary: #f0efe9;
        --text-secondary: #9a9891;
        --border-light: rgba(255,255,255,0.07);
        --border-mid: rgba(255,255,255,0.12);
        --border-strong: rgba(255,255,255,0.22);
        --green-bg: #04342C;
        --green-text: #9FE1CB;
        --amber-bg: #412402;
        --amber-text: #FAC775;
        --red-bg: #501313;
        --red-text: #F7C1C1;
        --gray-bg: #2c2c2a;
        --gray-text: #9a9891;
      }
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 28px;
      font-weight: normal;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    header p {
      font-size: 14px;
      color: var(--text-secondary);
      font-family: monospace;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 0.875rem 1rem;
    }

    .stat-label {
      font-size: 11px;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .stat-val {
      font-size: 24px;
      color: var(--text-primary);
    }

    .stat-val.overdue { color: #E24B4A; }
    .stat-val.soon { color: #BA7517; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filters {
      display: flex;
      gap: 6px;
      flex: 1;
      flex-wrap: wrap;
    }

    .pill {
      font-size: 12px;
      font-family: monospace;
      padding: 5px 14px;
      border-radius: 999px;
      border: 0.5px solid var(--border-mid);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.1s;
    }

    .pill:hover { background: var(--bg-secondary); }
    .pill.active {
      background: var(--text-primary);
      color: var(--bg-primary);
      border-color: var(--text-primary);
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-family: monospace;
      padding: 7px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-mid);
      background: var(--bg-primary);
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.1s;
    }

    .add-btn:hover { background: var(--bg-secondary); }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .task {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 0.875rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.1s, opacity 0.2s;
      position: relative;
    }

    .task:hover { border-color: var(--border-mid); }
    .task.done { opacity: 0.45; }
    .task.done .task-title { text-decoration: line-through; }

    .check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .check.checked {
      background: var(--green);
      border-color: var(--green);
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .task-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .meta-item {
      font-size: 12px;
      font-family: monospace;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .badge {
      font-size: 11px;
      font-family: monospace;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: normal;
    }

    .badge.overdue { background: var(--red-bg); color: var(--red-text); }
    .badge.due-today { background: var(--amber-bg); color: var(--amber-text); }
    .badge.soon { background: var(--amber-bg); color: var(--amber-text); }
    .badge.ok { background: var(--green-bg); color: var(--green-text); }
    .badge.done { background: var(--gray-bg); color: var(--gray-text); }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-family: monospace;
      flex-shrink: 0;
    }

    .delete-btn {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%) scale(0.85);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-mid);
      background: var(--bg-primary);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s, transform 0.15s, border-color 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .task:hover .delete-btn {
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    .delete-btn:hover {
      background: var(--red-bg);
      color: var(--red-text);
      border-color: var(--red-text);
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
      font-family: monospace;
      font-size: 13px;
      border: 0.5px dashed var(--border-mid);
      border-radius: var(--radius-lg);
    }

    /* Modal */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-bg.open { display: flex; }

    .modal {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      width: min(420px, 100%);
    }

    .modal h3 {
      font-size: 16px;
      font-weight: normal;
      margin-bottom: 1.25rem;
      color: var(--text-primary);
    }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      font-size: 11px;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }

    .field input, .field select {
      width: 100%;
      padding: 8px 10px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .field input:focus, .field select:focus {
      border-color: var(--border-strong);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 1.25rem;
    }

    .btn-cancel {
      padding: 8px 16px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      font-family: monospace;
    }

    .btn-add {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--text-primary);
      color: var(--bg-primary);
      cursor: pointer;
      font-size: 13px;
      font-family: monospace;
    }

    .btn-cancel:hover { background: var(--bg-secondary); }
    .btn-add:hover { opacity: 0.85; }

    @media (max-width: 520px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Deadline tracker</h1>
      <p>15-person group · shared task board</p>
    </header>

    <div class="stats">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="s-total">0</div></div>
      <div class="stat"><div class="stat-label">Overdue</div><div class="stat-val overdue" id="s-overdue">0</div></div>
      <div class="stat"><div class="stat-label">Due this week</div><div class="stat-val soon" id="s-soon">0</div></div>
      <div class="stat"><div class="stat-label">Completed</div><div class="stat-val" id="s-done">0</div></div>
    </div>

    <div class="toolbar">
      <div class="filters">
        <button class="pill active" onclick="setFilter('all',this)">All</button>
        <button class="pill" onclick="setFilter('overdue',this)">Overdue</button>
        <button class="pill" onclick="setFilter('soon',this)">Due soon</button>
        <button class="pill" onclick="setFilter('done',this)">Done</button>
      </div>
      <button class="add-btn" onclick="openModal()">
        <i class="ti ti-plus"></i> Add task
      </button>
    </div>

    <div class="task-list" id="task-list"></div>
  </div>

  <!-- Modal -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <h3>New task</h3>
      <div class="field">
        <label>Task title</label>
        <input type="text" id="f-title" placeholder="e.g. Submit final report" />
      </div>
      <div class="field">
        <label>Assigned to</label>
        <select id="f-person">
          <option value="" disabled selected>Select a team member</option>
          <option>All</option>
          <option>Adam</option>
          <option>Chelsi</option>
          <option>Chintan</option>
          <option>Eobii</option>
          <option>Haatim</option>
          <option>Iryna</option>
          <option>Jason</option>
          <option>Jayden</option>
          <option>Jose</option>
          <option>Kyle</option>
          <option>Rebecca</option>
          <option>Sahasra</option>
          <option>Sanika</option>
          <option>Sarah</option>
          <option>Surabhi</option>
        </select>
      </div>
      <div class="field">
        <label>Due date</label>
        <input type="date" id="f-date" />
      </div>
      <div class="field">
        <label>Due time <span style="font-size:10px;color:var(--text-secondary);text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="time" id="f-time" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-add" onclick="addTask()">Add task</button>
      </div>
    </div>
  </div>

  <script>
    const COLORS = ['#534AB7','#0F6E56','#993C1D','#185FA5','#993556','#3B6D11','#854F0B','#A32D2D'];
    const BG_COLORS = ['#EEEDFE','#E1F5EE','#FAECE7','#E6F1FB','#FBEAF0','#EAF3DE','#FAEEDA','#FCEBEB'];

    const today = new Date(); today.setHours(0,0,0,0);
    const sevenDays = new Date(today); sevenDays.setDate(today.getDate() + 7);

    let filter = 'all';
    let tasks = JSON.parse(localStorage.getItem('deadline-tasks') || 'null') || [
      { id:1, title:'Finalize project brief', person:'Alex M', date: daysFromNow(-2), done:false },
      { id:2, title:'Review design mockups', person:'Jamie L', date: daysFromNow(0), done:false },
      { id:3, title:'Send stakeholder update', person:'Sam K', date: daysFromNow(3), done:false },
      { id:4, title:'Write test cases', person:'Riley P', date: daysFromNow(6), done:false },
      { id:5, title:'Prepare demo slides', person:'Morgan T', date: daysFromNow(10), done:true },
    ];

    function daysFromNow(n) {
      const d = new Date(today); d.setDate(d.getDate() + n);
      return d.toISOString().split('T')[0];
    }

    function save() {
      localStorage.setItem('deadline-tasks', JSON.stringify(tasks));
    }

    function getStatus(task) {
      if (task.done) return 'done';
      const d = new Date(task.date); d.setHours(0,0,0,0);
      if (d < today) return 'overdue';
      if (d.getTime() === today.getTime()) return 'due-today';
      if (d <= sevenDays) return 'soon';
      return 'ok';
    }

    function badgeLabel(status, dateStr) {
      if (status === 'done') return 'Done';
      const d = new Date(dateStr); d.setHours(0,0,0,0);
      const diff = Math.round((d - today) / 86400000);
      if (status === 'overdue') return diff === -1 ? 'Yesterday' : `${Math.abs(diff)}d overdue`;
      if (status === 'due-today') return 'Due today';
      return `${diff}d left`;
    }

    function formatTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const ampm = h >= 12 ? 'pm' : 'am';
      const h12 = h % 12 || 12;
      return `${h12}:${String(m).padStart(2,'0')}${ampm}`;
    }

    function initials(name) {
      return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function colorIdx(name) {
      let h = 0;
      for (const c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
      return h;
    }

    function renderTasks() {
      const list = document.getElementById('task-list');
      let visible = tasks;
      if (filter === 'overdue') visible = tasks.filter(t => getStatus(t) === 'overdue');
      else if (filter === 'soon') visible = tasks.filter(t => ['soon','due-today'].includes(getStatus(t)));
      else if (filter === 'done') visible = tasks.filter(t => t.done);

      if (visible.length === 0) {
        list.innerHTML = '<div class="empty">No tasks here.</div>';
      } else {
        list.innerHTML = visible.map(task => {
          const st = getStatus(task);
          const ci = colorIdx(task.person);
          const isAll = task.person === 'All';
          const avatarStyle = isAll
            ? `background:var(--bg-secondary);color:var(--text-secondary);font-size:9px;`
            : `background:${BG_COLORS[ci]};color:${COLORS[ci]}`;
          const avatarText = isAll ? 'ALL' : initials(task.person);
          const timeStr = task.time ? `<span class="meta-item"><i class="ti ti-clock" style="font-size:12px"></i>${formatTime(task.time)}</span>` : '';
          return `<div class="task${task.done ? ' done' : ''}">
            <div class="check${task.done ? ' checked' : ''}" onclick="toggle(${task.id})" title="Mark ${task.done ? 'incomplete' : 'complete'}">
              ${task.done ? '<i class="ti ti-check" style="font-size:12px;color:white"></i>' : ''}
            </div>
            <div class="task-body">
              <div class="task-title">${task.title}</div>
              <div class="task-meta">
                <span class="meta-item"><i class="ti ti-user" style="font-size:12px"></i>${task.person}</span>
                <span class="meta-item"><i class="ti ti-calendar" style="font-size:12px"></i>${task.date}</span>
                ${timeStr}
                <span class="badge ${st}">${badgeLabel(st, task.date)}</span>
              </div>
            </div>
            <div class="avatar" style="${avatarStyle}">${avatarText}</div>
            <button class="delete-btn" onclick="deleteTask(${task.id})" title="Delete task" aria-label="Delete task">
              <i class="ti ti-trash" style="font-size:15px"></i>
            </button>
          </div>`;
        }).join('');
      }
      updateStats();
    }

    function updateStats() {
      document.getElementById('s-total').textContent = tasks.length;
      document.getElementById('s-overdue').textContent = tasks.filter(t => getStatus(t) === 'overdue').length;
      document.getElementById('s-soon').textContent = tasks.filter(t => ['soon','due-today'].includes(getStatus(t))).length;
      document.getElementById('s-done').textContent = tasks.filter(t => t.done).length;
    }

    function toggle(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      renderTasks();
    }

    function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      tasks = tasks.filter(t => t.id !== id);
      save();
      renderTasks();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    }

    function openModal() {
      document.getElementById('f-title').value = '';
      document.getElementById('f-person').value = '';
      document.getElementById('f-date').value = daysFromNow(7);
      document.getElementById('f-time').value = '';
      document.getElementById('modal').classList.add('open');
      setTimeout(() => document.getElementById('f-title').focus(), 50);
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    function addTask() {
      const title = document.getElementById('f-title').value.trim();
      const person = document.getElementById('f-person').value.trim();
      const date = document.getElementById('f-date').value;
      const time = document.getElementById('f-time').value;
      if (!title || !person || !date) {
        alert('Please fill in all fields.');
        return;
      }
      tasks.push({ id: Date.now(), title, person, date, time: time || '', done: false });
      save();
      closeModal();
      renderTasks();
    }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    renderTasks();
  </script>
</body>
</html>
